# docker-compose.training.yml
#
# Fine-tuning overlay for projectdavid-core.
# Opt-in — requires NVIDIA GPU and nvidia-container-toolkit.
#
# USAGE:
#   docker compose -f docker-compose.yml -f docker-compose.training.yml up -d
#
# Or if training flag is added to generate_docker_compose.py:
#   entities-dev --mode up --train
#
# SERVICES:
#   training-worker — long-running Redis queue consumer.
#     Blocks on BRPOP, processes one job at a time, spawns entrypoint.sh
#     as a subprocess per job. GPU memory is held only during training
#     and fully released when the subprocess exits.
#
# DIRECTORY CONTRACT (all under ${SHARED_PATH} → /mnt/training_data):
#   datasets/{user_id}/{dataset_id}/   ← prepared input files  (read)
#   configs/{job_id}/config.yml        ← written by worker     (read)
#   checkpoints/{job_id}/              ← training output       (write)
#   .hf_cache/                         ← HF model cache        (read/write)

services:
  training-worker:
    build:
      context: .
      dockerfile: docker/training/Dockerfile
    container_name: training_worker
    restart: unless-stopped
    runtime: nvidia
    environment:
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
      - ASSISTANTS_BASE_URL=http://api:9000
      - WORKER_API_KEY=${ADMIN_API_KEY}
      - SHARED_PATH=/mnt/training_data
      - HF_TOKEN=${HF_TOKEN:-}
      - HF_HOME=/mnt/training_data/.hf_cache
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
      - PYTHONUNBUFFERED=1
    volumes:
      - ${SHARED_PATH:-./shared_data}:/mnt/training_data
    command: ["python", "/app/worker.py"]
    depends_on:
      - redis
      - api
    networks:
      - my_custom_network
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]