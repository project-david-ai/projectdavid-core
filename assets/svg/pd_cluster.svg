<svg xmlns="http://www.w3.org/2000/svg" width="900" height="980" viewBox="0 0 900 980">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#94a3b8" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      .bg        { fill: #f8f9fc; }
      .title     { font-family: Georgia, serif; font-size: 22px; font-weight: 600; fill: #1e293b; }
      .tagline   { font-family: Georgia, serif; font-size: 13px; fill: #64748b; }
      .tier-lbl  { font-family: Georgia, serif; font-size: 11px; font-weight: 600; fill: #94a3b8; letter-spacing: 0.08em; }
      .lbl       { font-family: Georgia, serif; font-size: 11px; font-weight: 600; fill: #1e293b; }
      .sub       { font-family: Georgia, serif; font-size: 10px; fill: #64748b; }
      .sub-pur   { font-family: Georgia, serif; font-size: 10px; fill: #534ab7; }
      .sub-gray  { font-family: Georgia, serif; font-size: 10px; fill: #94a3b8; }
      .sub-green { font-family: Georgia, serif; font-size: 10px; fill: #16a34a; }
      .sub-red   { font-family: Georgia, serif; font-size: 10px; fill: #dc2626; }
      .conn      { stroke: #94a3b8; stroke-width: 1px; fill: none; }
      .conn-dash { stroke: #94a3b8; stroke-width: 0.75px; fill: none; stroke-dasharray: 4 2; }
      .conn-grn  { stroke: #16a34a; stroke-width: 1px; fill: none; }
      .conn-pur  { stroke: #534ab7; stroke-width: 1px; fill: none; }

      .box-ctrl  { fill: #eeedfe; stroke: #534ab7; stroke-width: 1.5px; stroke-dasharray: 5 3; }
      .box-api   { fill: #dbeafe; stroke: #185fa5; stroke-width: 0.75px; }
      .box-data  { fill: #ede9fe; stroke: #534ab7; stroke-width: 0.75px; }
      .box-ray   { fill: #f0fdf4; stroke: #16a34a; stroke-width: 1px; }
      .box-store { fill: #dcfce7; stroke: #22c55e; stroke-width: 0.75px; }
      .box-infer { fill: #f0fdf4; stroke: #16a34a; stroke-width: 1.5px; stroke-dasharray: 5 3; }
      .box-train { fill: #fdf2f8; stroke: #ec4899; stroke-width: 1.5px; stroke-dasharray: 5 3; }
      .box-node  { fill: #ffffff; stroke: #888780; stroke-width: 1px; }
      .box-work  { fill: #fdf2f8; stroke: #ec4899; stroke-width: 0.75px; }
      .box-actor { fill: #f0fdf4; stroke: #16a34a; stroke-width: 0.75px; }
      .box-vllm  { fill: #f1efe8; stroke: #5f5e5a; stroke-width: 0.75px; }
      .box-recon { fill: #ecfdf5; stroke: #059669; stroke-width: 0.75px; }
      .box-redis { fill: #fff7ed; stroke: #ea580c; stroke-width: 0.75px; }
      .box-warn  { fill: #fef9c3; stroke: #ca8a04; stroke-width: 0.75px; }
      .box-main  { fill: #dbeafe; stroke: #185fa5; stroke-width: 1px; }
      .lbl-blue  { font-family: Georgia, serif; font-size: 11px; font-weight: 600; fill: #185fa5; }
      .lbl-green { font-family: Georgia, serif; font-size: 11px; font-weight: 600; fill: #15803d; }
      .lbl-pink  { font-family: Georgia, serif; font-size: 11px; font-weight: 600; fill: #be185d; }
      .lbl-gray  { font-family: Georgia, serif; font-size: 11px; font-weight: 600; fill: #888780; }
      .lbl-amber { font-family: Georgia, serif; font-size: 11px; font-weight: 600; fill: #92400e; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="900" height="980" class="bg" rx="16"/>

  <!-- Header -->
  <text x="450" y="44" text-anchor="middle" class="title">Project David — Sovereign Forge Cluster Architecture</text>
  <text x="450" y="64" text-anchor="middle" class="tagline">inference-worker owns Ray · training-worker is Redis-driven · single GPU constraint applies</text>

  <!-- ── TIER 1: CONTROL PLANE ──────────────────────────────────── -->
  <text x="50" y="92" class="tier-lbl">1. CONTROL PLANE</text>
  <rect x="50" y="100" width="800" height="148" rx="12" class="box-ctrl"/>

  <!-- Training API -->
  <rect x="68" y="116" width="220" height="80" rx="6" class="box-api"/>
  <text x="178" y="136" text-anchor="middle" class="lbl">Training API  :9001</text>
  <text x="178" y="152" text-anchor="middle" class="sub">Redis singleton lease holder</text>
  <text x="178" y="166" text-anchor="middle" class="sub">activate() / deactivate() dispatcher</text>
  <text x="178" y="180" text-anchor="middle" class="sub">Queries Ray dashboard HTTP API</text>
  <text x="178" y="192" text-anchor="middle" class="sub-pur">http://inference_worker:8265</text>

  <!-- Redis -->
  <rect x="316" y="116" width="200" height="80" rx="6" class="box-data"/>
  <text x="416" y="136" text-anchor="middle" class="lbl">Redis</text>
  <text x="416" y="152" text-anchor="middle" class="sub">training_jobs queue</text>
  <text x="416" y="166" text-anchor="middle" class="sub">cluster:active_training_api lease</text>

  <!-- MySQL -->
  <rect x="540" y="116" width="294" height="80" rx="6" class="box-data"/>
  <text x="687" y="136" text-anchor="middle" class="lbl">MySQL</text>
  <text x="687" y="152" text-anchor="middle" class="sub">inference_deployments · base_models</text>
  <text x="687" y="166" text-anchor="middle" class="sub">fine_tuned_models · training_jobs</text>
  <text x="687" y="180" text-anchor="middle" class="sub-gray">compute_nodes · gpu_allocations  [phase 5 drop]</text>

  <line x1="288" y1="156" x2="314" y2="156" class="conn" marker-end="url(#arrow)"/>
  <line x1="516" y1="156" x2="538" y2="156" class="conn" marker-end="url(#arrow)"/>

  <!-- nginx note -->
  <rect x="68" y="208" width="766" height="28" rx="6" class="box-ray"/>
  <text x="451" y="226" text-anchor="middle" class="lbl-green">nginx :80  —  /v1/fine-tuned-models/ → :9001  ·  /v1/registry/ → :9001  ·  / → main api :9000</text>

  <!-- ── TIER 2: COMPUTE ──────────────────────────────────────────── -->
  <text x="50" y="256" class="tier-lbl">2. COMPUTE</text>

  <!-- INFERENCE WORKER CONTAINER ──────────────────────────────────── -->
  <rect x="50" y="264" width="420" height="480" rx="12" class="box-infer"/>
  <text x="260" y="286" text-anchor="middle" class="lbl-green">inference-worker  (Ray HEAD node)</text>
  <text x="260" y="302" text-anchor="middle" class="sub-green">docker/inference/Dockerfile  ·  GPU reserved via Ray scheduler</text>

  <!-- Ray HEAD -->
  <rect x="68" y="314" width="384" height="52" rx="6" class="box-actor"/>
  <text x="260" y="334" text-anchor="middle" class="lbl-green">Ray HEAD  ·  dashboard: localhost:8265</text>
  <text x="260" y="350" text-anchor="middle" class="sub-green">ray.init()  ·  Ray resources: GPU=1  CPU=8  memory=9.9GB</text>
  <text x="260" y="364" text-anchor="middle" class="sub-green">Ray Serve on :8000  ·  exposed externally on :8002</text>

  <!-- InferenceReconciler -->
  <rect x="68" y="378" width="384" height="80" rx="6" class="box-recon"/>
  <text x="260" y="398" text-anchor="middle" class="lbl-green">InferenceReconciler</text>
  <text x="260" y="414" text-anchor="middle" class="sub">Polls inference_deployments every 20s</text>
  <text x="260" y="428" text-anchor="middle" class="sub">Diffs DB state vs Ray Serve state</text>
  <text x="260" y="442" text-anchor="middle" class="sub">Deploys pending → calls serve.run(VLLMDeployment)</text>
  <text x="260" y="456" text-anchor="middle" class="sub">Deletes orphaned Ray Serve apps</text>

  <!-- VLLMDeployment -->
  <rect x="68" y="470" width="384" height="96" rx="6" class="box-vllm"/>
  <text x="260" y="490" text-anchor="middle" class="lbl">VLLMDeployment  [Ray Serve actor]</text>
  <text x="260" y="506" text-anchor="middle" class="sub">AsyncLLMEngine  ·  num_gpus=1 reserved via Ray scheduler</text>
  <text x="260" y="520" text-anchor="middle" class="sub">gpu_memory_utilization=0.50 (default, DB-overridable)</text>
  <text x="260" y="534" text-anchor="middle" class="sub-pur">Base model + LoRA adapter served from same GPU</text>
  <text x="260" y="548" text-anchor="middle" class="sub">Route: /vllm_dep_{id}  ·  OpenAI-compatible API</text>
  <text x="260" y="562" text-anchor="middle" class="sub-pur">Model param: vllm/vllm_dep_{id}</text>

  <!-- Single GPU warning -->
  <rect x="68" y="578" width="384" height="52" rx="6" class="box-warn"/>
  <text x="260" y="598" text-anchor="middle" class="lbl-amber">Single GPU constraint</text>
  <text x="260" y="614" text-anchor="middle" class="sub">Training and inference cannot run simultaneously on one GPU.</text>
  <text x="260" y="628" text-anchor="middle" class="sub">Call deactivate_all() before submitting a training job.</text>

  <!-- Samba read arrow -->
  <path d="M 260 674 L 260 718" class="conn-grn" marker-end="url(#arrow)"/>
  <text x="272" y="700" class="sub-green">read LoRA adapters</text>

  <!-- ── TRAINING WORKER CONTAINER ──────────────────────────────── -->
  <rect x="490" y="264" width="360" height="480" rx="12" class="box-train"/>
  <text x="670" y="286" text-anchor="middle" class="lbl-pink">training-worker  (pure Redis runner)</text>
  <text x="670" y="302" text-anchor="middle" class="sub">docker/training/Dockerfile  ·  No Ray — subprocess-based</text>

  <!-- Redis consumer -->
  <rect x="508" y="314" width="324" height="52" rx="6" class="box-redis"/>
  <text x="670" y="334" text-anchor="middle" class="lbl">Redis Queue Consumer</text>
  <text x="670" y="350" text-anchor="middle" class="sub">brpop training_jobs  ·  target_node routing</text>
  <text x="670" y="364" text-anchor="middle" class="sub">Blocking pop with 30s timeout</text>

  <!-- Subprocess trainer -->
  <rect x="508" y="378" width="324" height="80" rx="6" class="box-work"/>
  <text x="670" y="398" text-anchor="middle" class="lbl-pink">Subprocess Training Runner</text>
  <text x="670" y="414" text-anchor="middle" class="sub">Popen(unsloth_train.py)</text>
  <text x="670" y="428" text-anchor="middle" class="sub">Downloads dataset from Samba</text>
  <text x="670" y="442" text-anchor="middle" class="sub">Writes LoRA adapter to /mnt/training_data/models/ftm_*</text>
  <text x="670" y="456" text-anchor="middle" class="sub">Registers FineTunedModel in MySQL on completion</text>

  <!-- Scale note -->
  <rect x="508" y="470" width="324" height="68" rx="6" class="box-node"/>
  <text x="670" y="490" text-anchor="middle" class="lbl-gray">Scaling model</text>
  <text x="670" y="506" text-anchor="middle" class="sub">Vertical only — add CPU/RAM/GPU to host machine.</text>
  <text x="670" y="520" text-anchor="middle" class="sub">Horizontal Ray sharding not implemented.</text>
  <text x="670" y="534" text-anchor="middle" class="sub-gray">Multi-node training is a future roadmap item.</text>

  <!-- Training profiles -->
  <rect x="508" y="550" width="324" height="68" rx="6" class="box-warn"/>
  <text x="670" y="570" text-anchor="middle" class="lbl-amber">Training profiles</text>
  <text x="670" y="586" text-anchor="middle" class="sub">TRAINING_PROFILE=laptop  (low VRAM, bnb-4bit)</text>
  <text x="670" y="600" text-anchor="middle" class="sub">TRAINING_PROFILE=standard  (8GB+, LoRA defaults)</text>
  <text x="670" y="614" text-anchor="middle" class="sub">TRAINING_PROFILE=high  (24GB+, full precision)</text>

  <!-- Samba write arrow -->
  <path d="M 670 618 L 670 718" class="conn" marker-end="url(#arrow)"/>
  <text x="682" y="680" class="sub">write adapter + dataset</text>

  <!-- ── TIER 3: SHARED STORAGE ──────────────────────────────────── -->
  <text x="50" y="760" class="tier-lbl">3. SHARED STORAGE</text>
  <rect x="50" y="768" width="800" height="56" rx="10" class="box-store"/>
  <text x="450" y="792" text-anchor="middle" class="lbl">Samba Share  ·  /mnt/training_data</text>
  <text x="450" y="808" text-anchor="middle" class="sub">datasets/  (source JSONL)  ·  models/ftm_*/  (LoRA adapters)  ·  .hf_cache/  (HuggingFace weights)</text>

  <!-- ── TIER 4: MAIN API ─────────────────────────────────────────── -->
  <text x="50" y="848" class="tier-lbl">4. REQUEST ROUTING</text>
  <rect x="50" y="856" width="800" height="96" rx="12" class="box-main"/>
  <text x="450" y="878" text-anchor="middle" class="lbl-blue">main api  :9000  →  VLLM_BASE_URL=http://inference_worker:8000</text>
  <text x="450" y="896" text-anchor="middle" class="sub">Routes inference requests internally to the active Ray Serve deployment.</text>
  <text x="450" y="912" text-anchor="middle" class="sub">Request body must include model param:  vllm/vllm_dep_{deployment_id}</text>
  <text x="450" y="928" text-anchor="middle" class="sub-pur">Two routes per activation:  base backbone  +  LoRA adapter  —  same GPU footprint.</text>
  <text x="450" y="944" text-anchor="middle" class="sub">Activation flow:  SDK → nginx → training-api → MySQL → InferenceReconciler (≤20s) → Ray Serve → VLLMDeployment</text>

  <!-- Connecting arrows -->
  <!-- Training API writes to MySQL -->
  <path d="M 687 196 L 687 246 L 450 246 L 450 264" class="conn-dash" marker-end="url(#arrow)"/>

  <!-- InferenceReconciler polls MySQL -->
  <path d="M 452 418 L 540 418 L 687 418 L 687 248" class="conn-grn" marker-end="url(#arrow)"/>

  <!-- Redis → training worker -->
  <path d="M 416 196 L 416 254 L 560 254 L 560 314" class="conn-dash" marker-end="url(#arrow)"/>

  <!-- Main API → inference worker -->
  <path d="M 260 952 L 260 970 L 30 970 L 30 510 L 50 510" class="conn" marker-end="url(#arrow)"/>

</svg>
