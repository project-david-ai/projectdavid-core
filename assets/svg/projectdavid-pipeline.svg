  <text x="125" y="272" text-anchor="middle" font-size="10" fill="#555555">Shared models · schemas · utils</text>
  <text x="125" y="288" text-anchor="middle" font-size="10" fill="#185FA5">64,651 downloads · 105 countries</text>

  <!-- orm -->
  <rect x="240" y="236" width="190" height="64" rx="8" fill="#D5E8F0" stroke="#185FA5" stroke-width="0.75"/>
  <text x="335" y="256" text-anchor="middle" font-size="11" font-weight="500" fill="#1E3A5F">projectdavid-orm</text>
  <text x="335" y="272" text-anchor="middle" font-size="10" fill="#555555">Database ORM layer</text>
  <text x="335" y="288" text-anchor="middle" font-size="10" fill="#185FA5">4,095 downloads — week 1</text>

  <!-- services -->
  <rect x="450" y="236" width="190" height="64" rx="8" fill="#D5E8F0" stroke="#185FA5" stroke-width="0.75"/>
  <text x="545" y="256" text-anchor="middle" font-size="11" font-weight="500" fill="#1E3A5F">projectdavid-services</text>
  <text x="545" y="272" text-anchor="middle" font-size="10" fill="#555555">Shared service layer</text>
  <text x="545" y="288" text-anchor="middle" font-size="10" fill="#185FA5">3,968 downloads — week 1</text>

  <!-- sdk -->
  <rect x="660" y="236" width="210" height="64" rx="8" fill="#EDE0F5" stroke="#534AB7" stroke-width="0.75"/>
  <text x="765" y="256" text-anchor="middle" font-size="11" font-weight="500" fill="#1E3A5F">projectdavid  (SDK)</text>
  <text x="765" y="272" text-anchor="middle" font-size="10" fill="#555555">Python client · API interface</text>
  <text x="765" y="288" text-anchor="middle" font-size="10" fill="#534AB7">190,777 downloads · 30+ countries</text>

  <!-- Dotted upward connectors from shared packages to pipeline -->
  <line x1="125" y1="236" x2="125" y2="186" stroke="#888780" stroke-width="0.75" stroke-dasharray="3 2" fill="none" marker-end="url(#arrow-gray)"/>
  <line x1="335" y1="236" x2="335" y2="186" stroke="#888780" stroke-width="0.75" stroke-dasharray="3 2" fill="none" marker-end="url(#arrow-gray)"/>
  <line x1="545" y1="236" x2="545" y2="186" stroke="#888780" stroke-width="0.75" stroke-dasharray="3 2" fill="none" marker-end="url(#arrow-gray)"/>
  <line x1="765" y1="236" x2="765" y2="186" stroke="#888780" stroke-width="0.75" stroke-dasharray="3 2" fill="none" marker-end="url(#arrow-gray)"/>

  <!-- ── STATS ROW ── -->
  <line x1="30" y1="330" x2="870" y2="330" stroke="#E6F1FB" stroke-width="1"/>

  <rect x="30" y="344" width="200" height="60" rx="8" fill="#FFF3CC" stroke="#7B5E00" stroke-width="0.75"/>
  <text x="130" y="366" text-anchor="middle" font-size="14" font-weight="500" fill="#1E3A5F">273,753+</text>
  <text x="130" y="384" text-anchor="middle" font-size="10" fill="#555555">total ecosystem downloads</text>
  <text x="130" y="398" text-anchor="middle" font-size="10" fill="#7B5E00">all packages combined</text>

  <rect x="250" y="344" width="200" height="60" rx="8" fill="#FFF3CC" stroke="#7B5E00" stroke-width="0.75"/>
  <text x="350" y="366" text-anchor="middle" font-size="14" font-weight="500" fill="#1E3A5F">105 countries</text>
  <text x="350" y="384" text-anchor="middle" font-size="10" fill="#555555">verified deployment footprint</text>
  <text x="350" y="398" text-anchor="middle" font-size="10" fill="#7B5E00">via projectdavid-common proxy</text>

  <rect x="470" y="344" width="200" height="60" rx="8" fill="#FFF3CC" stroke="#7B5E00" stroke-width="0.75"/>
  <text x="570" y="366" text-anchor="middle" font-size="14" font-weight="500" fill="#1E3A5F">119,853</text>
  <text x="570" y="384" text-anchor="middle" font-size="10" fill="#555555">enterprise mirror events</text>
  <text x="570" y="398" text-anchor="middle" font-size="10" fill="#7B5E00">bandersnatch · Nexus · devpi</text>

  <rect x="690" y="344" width="180" height="60" rx="8" fill="#FFF3CC" stroke="#7B5E00" stroke-width="0.75"/>
  <text x="780" y="366" text-anchor="middle" font-size="14" font-weight="500" fill="#1E3A5F">47%</text>
  <text x="780" y="384" text-anchor="middle" font-size="10" fill="#555555">SDK downloads via mirrors</text>
  <text x="780" y="398" text-anchor="middle" font-size="10" fill="#7B5E00">air-gapped deployments</text>

  <!-- ── SOVEREIGN FORGE ── -->
  <rect x="30" y="428" width="840" height="60" rx="10" fill="#ffffff" stroke="#2E75B6" stroke-width="1" stroke-dasharray="6 3"/>
  <text x="450" y="452" text-anchor="middle" font-size="12" font-weight="500" fill="#1E3A5F">Sovereign Forge  —  in development</text>
  <text x="450" y="470" text-anchor="middle" font-size="10" fill="#555555">Distributed GPU supercluster · consumer hardware · sovereign AI training at scale · one env var to join</text>

  <!-- Arrow from stack down to sovereign forge -->
  <line x1="770" y1="186" x2="770" y2="344" stroke="#888780" stroke-width="0.5" stroke-dasharray="3 2" fill="none"/>
  <line x1="450" y1="414" x2="450" y2="428" stroke="#2E75B6" stroke-width="1" fill="none" marker-end="url(#arrow)"/>

  <!-- Footer -->
  <text x="450" y="510" text-anchor="middle" font-size="10" fill="#B4B2A9">© Francis Neequaye Armah — Project David — March 2026 — PolyForm Noncommercial License 1.0.0</text>
