<svg xmlns="http://www.w3.org/2000/svg" width="900" height="520" viewBox="0 0 900 520">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#2E75B6" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arrow-gray" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#888780" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      text { font-family: Arial, sans-serif; }
    </style>
  </defs>

  <!-- Title -->
  <text x="450" y="38" text-anchor="middle" font-size="18" font-weight="500" fill="#1E3A5F">Project David — Core to Platform Pipeline</text>
  <text x="450" y="58" text-anchor="middle" font-size="12" fill="#555555">From research codebase to sovereign air-gapped AI deployment</text>

  <!-- ── STAGE 1: projectdavid-core ── -->
  <rect x="30" y="86" width="180" height="100" rx="10" fill="#F2F4F7" stroke="#5F5E5A" stroke-width="1.5" stroke-dasharray="5 3"/>
  <text x="120" y="110" text-anchor="middle" font-size="11" font-weight="500" fill="#1E3A5F">projectdavid-core</text>
  <text x="120" y="128" text-anchor="middle" font-size="10" fill="#555555">Runtime API engine</text>
  <text x="120" y="144" text-anchor="middle" font-size="10" fill="#555555">AI orchestration</text>
  <text x="120" y="160" text-anchor="middle" font-size="10" fill="#555555">Training pipeline</text>
  <text x="120" y="174" text-anchor="middle" font-size="10" fill="#888780">git clone only</text>

  <!-- Arrow 1→2 -->
  <line x1="210" y1="136" x2="248" y2="136" stroke="#2E75B6" stroke-width="1" fill="none" marker-end="url(#arrow)"/>
  <text x="229" y="126" text-anchor="middle" font-size="9" fill="#888780">builds</text>

  <!-- ── STAGE 2: Docker Images ── -->
  <rect x="250" y="86" width="160" height="100" rx="10" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.75"/>
  <text x="330" y="110" text-anchor="middle" font-size="11" font-weight="500" fill="#1E3A5F">Docker Images</text>
  <text x="330" y="128" text-anchor="middle" font-size="10" fill="#555555">core-api  :latest</text>
  <text x="330" y="144" text-anchor="middle" font-size="10" fill="#555555">core-sandbox  :latest</text>
  <text x="330" y="160" text-anchor="middle" font-size="10" fill="#555555">core-training-api</text>
  <text x="330" y="174" text-anchor="middle" font-size="10" fill="#185FA5">Docker Hub — thanosprime</text>

  <!-- Arrow 2→3 -->
  <line x1="410" y1="136" x2="448" y2="136" stroke="#2E75B6" stroke-width="1" fill="none" marker-end="url(#arrow)"/>
  <text x="429" y="126" text-anchor="middle" font-size="9" fill="#888780">pulled by</text>

  <!-- ── STAGE 3: projectdavid-platform ── -->
  <rect x="450" y="86" width="180" height="100" rx="10" fill="#EDE0F5" stroke="#534AB7" stroke-width="1"/>
  <text x="540" y="110" text-anchor="middle" font-size="11" font-weight="500" fill="#1E3A5F">projectdavid-platform</text>
  <text x="540" y="128" text-anchor="middle" font-size="10" fill="#555555">pip install</text>
  <text x="540" y="144" text-anchor="middle" font-size="10" fill="#555555">Docker Compose orchestration</text>
  <text x="540" y="160" text-anchor="middle" font-size="10" fill="#555555">pdavid --mode up</text>
  <text x="540" y="174" text-anchor="middle" font-size="10" fill="#534AB7">PyPI — 10K+ downloads</text>

