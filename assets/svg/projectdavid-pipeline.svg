  <rect x="670" y="86" width="200" height="100" rx="10" fill="#D6F0E0" stroke="#1A6B3C" stroke-width="1"/>
  <text x="770" y="110" text-anchor="middle" font-size="11" font-weight="500" fill="#1E3A5F">Sovereign AI Stack</text>
  <text x="770" y="128" text-anchor="middle" font-size="10" fill="#555555">API · DB · Sandbox · Search</text>
  <text x="770" y="144" text-anchor="middle" font-size="10" fill="#555555">Ollama · vLLM · Ray cluster</text>
  <text x="770" y="160" text-anchor="middle" font-size="10" fill="#1A6B3C">Fully air-gapped at runtime</text>
  <text x="770" y="174" text-anchor="middle" font-size="10" fill="#1A6B3C">No external dependencies</text>

