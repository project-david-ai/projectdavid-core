[mypy]
# 1. CORE CONFIG
python_version = 3.11
warn_return_any = False
warn_unused_configs = True
check_untyped_defs = True
exclude = src/

# 2. NOISE REDUCER
ignore_missing_imports = True

# 3. ARCHITECTURE-SPECIFIC SUPPRESSIONS
disable_error_code = name-defined, union-attr, import-untyped, attr-defined

# 4. SPECIFIC OVERRIDES
[mypy-requests.*]
ignore_missing_imports = True

[mypy-nest_asyncio.*]
ignore_missing_imports = True

[mypy-projectdavid_common.*]
ignore_missing_imports = True

[mypy-sentence_transformers.*]
ignore_missing_imports = True

[mypy-sseclient.*]
ignore_missing_imports = True

[mypy-fastapi.*]
ignore_missing_imports = True

[mypy-sqlalchemy.*]
ignore_missing_imports = True

[mypy-uvicorn.*]
ignore_missing_imports = True

[mypy-pymysql.*]
ignore_missing_imports = True

[mypy-ollama.*]
ignore_missing_imports = True

[mypy-groq.*]
ignore_missing_imports = True

[mypy-pysmb.*]
ignore_missing_imports = True

[mypy-qdrant_client.*]
ignore_missing_imports = True

[mypy-pdfplumber.*]
ignore_missing_imports = True

[mypy-validators.*]
ignore_missing_imports = True
